[project]
name = "astra-cli"
version = "0.1.0"
description = "Code plagiarism detector"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "astra-core",
    "rich>=15.0.0",
    "typer>=0.25.1",
]

[tool.uv.sources]
astra-core = { workspace = true }

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project.scripts]
astra = "main:app"
